<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fundo escuro arredondado -->
  <rect width="64" height="64" rx="14" fill="#0c0c0c"/>

  <!-- Carro F1 silhueta -->
  <!-- Corpo principal -->
  <rect x="10" y="28" width="44" height="10" rx="5" fill="#e8141c"/>
  <!-- Cockpit -->
  <ellipse cx="32" cy="26" rx="9" ry="5" fill="#e8141c"/>
  <!-- Asa dianteira -->
  <rect x="4" y="35" width="14" height="3" rx="1.5" fill="#ffffff"/>
  <!-- Asa traseira -->
  <rect x="46" y="33" width="14" height="3" rx="1.5" fill="#ffffff"/>
  <!-- Suporte asa traseira -->
  <rect x="52" y="28" width="2" height="8" rx="1" fill="#ffffff"/>
  <!-- Roda traseira esquerda -->
  <circle cx="18" cy="39" r="5" fill="#1a1a1a" stroke="#e8141c" stroke-width="2"/>
  <circle cx="18" cy="39" r="2" fill="#e8141c"/>
  <!-- Roda dianteira -->
  <circle cx="46" cy="39" r="5" fill="#1a1a1a" stroke="#e8141c" stroke-width="2"/>
  <circle cx="46" cy="39" r="2" fill="#e8141c"/>

  <!-- Listras decorativas -->
  <rect x="22" y="28" width="2" height="10" rx="1" fill="#ffffff" opacity="0.25"/>
  <rect x="27" y="28" width="2" height="10" rx="1" fill="#ffffff" opacity="0.15"/>
</svg>
